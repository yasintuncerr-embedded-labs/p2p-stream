[device]
name  = pi_zero2w
iface = wlan0

[source]
camera_device = /dev/video0
element       = libcamerasrc
caps_format   = NV12
need_convert  = true

[encoder]
h264_element      = x264enc
h264_extra        = tune=zerolatency bitrate=2000 speed-preset=ultrafast
h265_element      = x265enc
h265_extra        = speed-preset=ultrafast tune=zerolatency
bitrate_unit_kbps = false

[decoder]
h264_element = avdec_h264
h265_element = avdec_h265

[sink]
hdmi    = kmssink
display = autovideosink

[network]
rtp_pt_h265    = 96
rtp_pt_h264    = 97
stream_port    = 5600
peer_ip_host   = 192.168.77.1
peer_ip_client = 192.168.77.2

[pipeline_tuning]
pre_encode_queue = true
pre_network_queue = true