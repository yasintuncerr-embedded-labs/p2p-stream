# =============================================================================
# NOT Tested — estimated config for Raspberry Pi Zero 2W with libcamera CSI camera.
# Device Profile: Raspberry Pi Zero 2W
# Wi-Fi: wlan0 | Camera: libcamera (CSI) | Codec: SW only (x264/x265)
# =============================================================================

[device]
name  = pi_zero2w
iface = wlan0

# -----------------------------------------------------------------------------
# Source
#   libcamerasrc does not accept device= or io-mode= properties.
#   sender.c detects "libcamera" prefix and omits those arguments.
#   need_convert=true: libcamerasrc outputs various formats; videoconvert
#   normalises to NV12 before the SW encoder.
# -----------------------------------------------------------------------------
[source]
camera_device = /dev/video0
element       = libcamerasrc
caps_format   = NV12
need_convert  = true
io_mode       = 2

# -----------------------------------------------------------------------------
# Encoder — software only on Zero 2W (no HW VPU exposed via V4L2 M2M)
#   tune=zerolatency : disables lookahead and B-frames → minimum encode delay
#   speed-preset=ultrafast : lowest CPU cost on the weak ARM Cortex-A53
#   bitrate_unit_kbps=true : x264enc / x265enc "bitrate" property is in kbps
#   output_io_mode=0 : not applicable for SW encoders
# -----------------------------------------------------------------------------
[encoder]
h264_element      = x264enc
h264_extra        = tune=zerolatency speed-preset=ultrafast
h265_element      = x265enc
h265_extra        = tune=zerolatency speed-preset=ultrafast
bitrate_unit_kbps = true
output_io_mode    = 0

# -----------------------------------------------------------------------------
# Decoder — software fallback (Zero 2W is receiver-unlikely but supported)
# -----------------------------------------------------------------------------
[decoder]
h264_element = avdec_h264
h264_extra   =
h265_element = avdec_h265
h265_extra   =

[sink]
hdmi    = kmssink
display = autovideosink

# -----------------------------------------------------------------------------
# Network
#   udp_buffer_size : 4 MB — Zero 2W RAM is limited, avoid 8 MB
#   rtp_do_timestamp : false — NXP↔Pi share NTP on Wi-Fi Direct
#   jitterbuffer_ms : 80 — SW encoder jitter is higher than HW
# -----------------------------------------------------------------------------
[network]
rtp_pt_h265       = 96
rtp_pt_h264       = 97
stream_port       = 5600
rtsp_port         = 8554
peer_ip_host      = 192.168.77.1
peer_ip_client    = 192.168.77.2
udp_buffer_size   = 4194304
rtp_do_timestamp  = false
jitterbuffer_ms   = 80