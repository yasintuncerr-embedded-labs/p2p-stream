# =============================================================================
# NOT Tested — estimated config for macOS (Apple Silicon / Intel).
# Device Profile: macOS
# Wi-Fi: en0 (change if needed) | Codec: SW (x264/x265) | Camera: AVFoundation
# =============================================================================

[device]
name  = macos
iface = en0

# -----------------------------------------------------------------------------
# Source
#   avfvideosrc: macOS AVFoundation camera source.
#   sender.c handles this source without device= and io-mode= args.
#   need_convert=true: normalize to NV12 before SW encoders.
# -----------------------------------------------------------------------------
[source]
camera_device = /dev/video0
element       = avfvideosrc
caps_format   = NV12
need_convert  = true
io_mode       = 2

# -----------------------------------------------------------------------------
# Encoder — software (x264/x265)
#   tune=zerolatency + ultrafast for low-latency desktop test mode.
#   bitrate_unit_kbps=true: x264enc/x265enc expect kbps.
# -----------------------------------------------------------------------------
[encoder]
h264_element      = x264enc
h264_extra        = tune=zerolatency speed-preset=ultrafast
h265_element      = x265enc
h265_extra        = tune=zerolatency speed-preset=ultrafast
bitrate_unit_kbps = true
output_io_mode    = 0

# -----------------------------------------------------------------------------
# Decoder — software (libav)
# -----------------------------------------------------------------------------
[decoder]
h264_element = avdec_h264
h264_extra   =
h265_element = avdec_h265
h265_extra   =

[sink]
hdmi    = autovideosink
display = autovideosink

# -----------------------------------------------------------------------------
# Network
#   Aligned with nxp.ini for cross-device interop tests.
#   rtp_do_timestamp=true is safer when clocks are not NTP-synced.
# -----------------------------------------------------------------------------
[network]
rtp_pt_h265       = 96
rtp_pt_h264       = 97
stream_port       = 5600
rtsp_port         = 8554
peer_ip_host      = 192.168.2.1
peer_ip_client    = 192.168.2.2
udp_buffer_size   = 8388608
rtp_do_timestamp  = true
jitterbuffer_ms   = 50
fec_percentage    = 20
fec_pt            = 122
