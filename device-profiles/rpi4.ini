# =============================================================================
# NOT Tested — estimated config for Raspberry Pi 4B.
# Device Profile: Raspberry Pi 4B
# Wi-Fi: wlan0 | H264: v4l2h264enc (VideoCore HW) | H265: x265enc (SW)
# =============================================================================

[device]
name  = rpi4
iface = wlan0

# -----------------------------------------------------------------------------
# Source
#   v4l2src with YUY2 — RPi camera module via V4L2.
#   need_convert=true: YUY2 → NV12 via videoconvert before encoder.
#   io_mode=2 (mmap): safe default for V4L2 M2M encoder on VideoCore.
# -----------------------------------------------------------------------------
[source]
camera_device = /dev/video0
element       = v4l2src
caps_format   = YUY2
need_convert  = true
io_mode       = 2

# -----------------------------------------------------------------------------
# Encoder
#   H264: v4l2h264enc — VideoCore IV HW encoder (V4L2 M2M).
#     Bitrate injected via extra-controls as video_bitrate (bps).
#     gop_size=15 @ 30fps → I-frame every 500ms, good recovery on packet loss.
#   H265: x265enc — software fallback (VideoCore does not support H265).
#     tune=zerolatency removes B-frames and lookahead delay.
#   bitrate_unit_kbps=false: v4l2h264enc video_bitrate control expects bps.
#     NOTE: x265enc "bitrate" property expects kbps. Since both codecs share
#     this flag, x265enc will receive bps — pass bitrate scaled accordingly
#     or prefer H264 on RPi4 to avoid this mismatch.
#   output_io_mode=0: VideoCore encoder does not support dmabuf-export on
#     the output pad in the same way as Hantro VPU.
# -----------------------------------------------------------------------------
[encoder]
h264_element      = v4l2h264enc
h264_extra        = extra-controls="controls,video_gop_size=15,video_h264_i_frame_period=15"
h265_element      = x265enc
h265_extra        = tune=zerolatency speed-preset=ultrafast
bitrate_unit_kbps = false
output_io_mode    = 0

# -----------------------------------------------------------------------------
# Decoder
#   H264: v4l2h264dec — VideoCore HW decode.
#   H265: avdec_h265  — software fallback.
# -----------------------------------------------------------------------------
[decoder]
h264_element = v4l2h264dec
h264_extra   =
h265_element = avdec_h265
h265_extra   =

[sink]
hdmi    = kmssink
display = autovideosink

# -----------------------------------------------------------------------------
# Network
#   udp_buffer_size : 8 MB — RPi4 has enough RAM
#   rtp_do_timestamp : false — NTP synced on Wi-Fi Direct
#   jitterbuffer_ms : 50 — standard Wi-Fi Direct latency budget
# -----------------------------------------------------------------------------
[network]
rtp_pt_h265       = 96
rtp_pt_h264       = 97
stream_port       = 5600
rtsp_port         = 8554
peer_ip_host      = 192.168.77.1
peer_ip_client    = 192.168.77.2
udp_buffer_size   = 8388608
rtp_do_timestamp  = false
jitterbuffer_ms   = 50