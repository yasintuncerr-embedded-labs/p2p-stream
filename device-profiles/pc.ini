# =============================================================================
# NOT Tested — unverified config for Linux PC with software encoding/decoding.
# Device Profile: Linux PC (x86_64)
# Wi-Fi: wlan0 (change to eth0 for wired) | Codec: SW (x264/x265)
# Use case: development / testing without embedded hardware
# =============================================================================

[device]
name  = pc
iface = wlan0

# -----------------------------------------------------------------------------
# Source
#   v4l2src with YUY2 — standard USB webcam or V4L2 capture device.
#   need_convert=true: YUY2 → NV12 via videoconvert.
#   io_mode=2 (mmap): safe default.
#   For test-pattern mode, sender.c uses videotestsrc — camera_device ignored.
# -----------------------------------------------------------------------------
[source]
camera_device = /dev/video0
element       = v4l2src
caps_format   = YUY2
need_convert  = true
io_mode       = 2

# -----------------------------------------------------------------------------
# Encoder — software (x264/x265)
#   tune=zerolatency: no B-frames, no lookahead → minimum encode delay.
#   speed-preset=ultrafast: lowest CPU cost, highest bitrate efficiency traded.
#   bitrate_unit_kbps=true: x264enc / x265enc "bitrate" property is in kbps.
#   output_io_mode=0: not applicable for SW encoders.
# -----------------------------------------------------------------------------
[encoder]
h264_element      = x264enc
h264_extra        = tune=zerolatency speed-preset=ultrafast
h265_element      = x265enc
h265_extra        = tune=zerolatency speed-preset=ultrafast
bitrate_unit_kbps = true
output_io_mode    = 0

# -----------------------------------------------------------------------------
# Decoder — software (libav)
# -----------------------------------------------------------------------------
[decoder]
h264_element = avdec_h264
h264_extra   =
h265_element = avdec_h265
h265_extra   =

[sink]
hdmi    = autovideosink
display = autovideosink

# -----------------------------------------------------------------------------
# Network
#   peer_ip_host / peer_ip_client = 127.0.0.1 for loopback self-test.
#   Change to actual peer IP when testing against a real device.
#   rtp_do_timestamp=true: PC clock is unlikely to be NTP-synced with NXP.
#   jitterbuffer_ms=50: reasonable for Wi-Fi or loopback.
# -----------------------------------------------------------------------------
[network]
rtp_pt_h265       = 96
rtp_pt_h264       = 97
stream_port       = 5600
rtsp_port         = 8554
peer_ip_host      = 127.0.0.1
peer_ip_client    = 127.0.0.1
udp_buffer_size   = 8388608
rtp_do_timestamp  = true
jitterbuffer_ms   = 50