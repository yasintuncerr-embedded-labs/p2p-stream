# =============================================================================
# Device Profile: NXP i.MX8M (AzureWave 88W8997)
# Wi-Fi: mlan0 | VPU: v4l2 (imx-vpu-hantro) | Camera: MIPI CSI via mxc_isi
# =============================================================================

[device]
name  = nxp
iface = mlan0

# -----------------------------------------------------------------------------
# Source
#   camera_device : V4L2 node exposed by mxc_isi ISP
#   caps_format   : NV12 is native VPU input on iMX8M — zero-copy path
#   need_convert  : false — v4l2src delivers NV12 directly
#   io_mode       : 2=mmap — safe with Hantro VPU M2M (v4l2h265enc/v4l2h264enc).
#                   DO NOT use 4 (dmabuf-export): the VPU encoder does not
#                   import DMA-BUF from v4l2src, causing not-negotiated (-4).
# -----------------------------------------------------------------------------
[source]
camera_device = /dev/video3
element       = v4l2src
caps_format   = NV12
need_convert  = false
io_mode       = 2

# -----------------------------------------------------------------------------
# Encoder
#   NXP iMX8M Plus Hantro VPU exposed via V4L2 M2M interface.
#   output_io_mode = 4 (dmabuf-export on encoder OUTPUT pad — safe on iMX8MP).
#     This bypasses the VPU internal output queue, removing ~1 s of encode
#     latency. Note: this is the OUTPUT side of the encoder, not the input
#     (v4l2src io-mode). The two are independent.
#
#   video_bitrate_mode=0 : VBR (Variable Bitrate). Saves bandwidth during
#     static scenes but allows the bitrate to stretch during sudden camera
#     movements (action). Using CBR (1) caused the VPU to drop quality and
#     create "fine blockiness" (mosaic) during fast motion.
#
#   video_gop_size=30 : I-frame interval. For a 60 fps stream, this produces
#     2 full frames (I-frames) per second. This prevents sudden "traffic jams"
#     on the Wi-Fi link and eliminates the heartbeat-like stutters.
#
#   h264_profile=4, h264_level=13 : Requests "High Profile" and "Level 4.2"
#     from the hardware. Enabling advanced algorithms like CABAC instead of
#     Baseline (0) ensures a crystal-clear, mosaic-free image at 1080p 60fps.
#
#   repeat_sequence_header=1 : Ensures SPS/PPS headers are sent with every
#     I-frame, allowing the receiver to immediately recover decoding.
#   bitrate_unit_kbps = false → element accepts bps
# -----------------------------------------------------------------------------
[encoder]
h265_element      = v4l2h265enc
h265_extra        = extra-controls="controls,video_bitrate_mode=1,video_gop_size=30,repeat_sequence_header=1,hevc_profile=0,hevc_level=7"

h264_element      = v4l2h264enc
h264_extra        = extra-controls="controls,video_bitrate_mode=1,video_gop_size=30,repeat_sequence_header=1,h264_profile=4,h264_level=13"

output_io_mode    = 4
bitrate_unit_kbps = false

# -----------------------------------------------------------------------------
# Decoder
#   Same Hantro VPU, M2M decode path.
# -----------------------------------------------------------------------------
[decoder]
h265_element = v4l2h265dec
h265_extra   =
h264_element = v4l2h264dec
h264_extra   =

# -----------------------------------------------------------------------------
# Sink
#   kmssink : direct DRM/KMS → zero-copy HDMI output.
#   waylandsink : NXP Wayland/Weston fallback.
# -----------------------------------------------------------------------------
[sink]
hdmi    = kmssink
display = waylandsink

# -----------------------------------------------------------------------------
# Network
#   udp_buffer_size   : UDP socket recv buffer in bytes. Requires
#                       net.core.rmem_max >= this value (set via sysctl or
#                       /etc/sysctl.d/). 8 MB absorbs Wi-Fi burst drops.
#   rtp_do_timestamp  : Override RTP timestamps with local wall-clock.
#                       false for NXP↔NXP (clocks synced via NTP).
#                       true  for NXP→Mac/PC test (clocks not synced).
#   jitterbuffer_ms   : rtpjitterbuffer latency. 0 = disabled.
#                       50 ms good starting point for Wi-Fi Direct.
# -----------------------------------------------------------------------------
[network]
rtp_pt_h265       = 96
rtp_pt_h264       = 97
stream_port       = 5600
rtsp_port         = 8554
peer_ip_host      = 192.168.2.1
peer_ip_client    = 192.168.2.2
udp_buffer_size   = 8388608
rtp_do_timestamp  = false
jitterbuffer_ms   = 50
fec_percentage    = 20
fec_pt            = 122