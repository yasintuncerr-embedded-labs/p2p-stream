# =============================================================================
# Device Profile: NXP i.MX8M (AzureWave 88W8997)
# Wi-Fi: mlan0 | VPU: v4l2 (imx-vpu-hantro) | Camera: MIPI CSI via mxc_isi
# =============================================================================

[device]
name  = nxp
iface = eth0

# -----------------------------------------------------------------------------
# Source
#   camera_device : V4L2 node exposed by mxc_isi ISP
#   caps_format   : NV12 is native VPU input on iMX8M — zero-copy path
#   need_convert  : false — v4l2src delivers NV12 directly
# -----------------------------------------------------------------------------
[source]
camera_device = /dev/video3
element       = v4l2src
caps_format   = NV12
need_convert  = false
# io_mode: 2=mmap — safe with Hantro VPU M2M (v4l2h265enc/v4l2h264enc).
# DO NOT use 4 (dmabuf-export): the VPU encoder does not import DMA-BUF
# from v4l2src, causing immediate not-negotiated (-4) on pipeline start.
io_mode       = 2

# -----------------------------------------------------------------------------
# Encoder
#   NXP iMX8M Hantro VPU exposed via V4L2 M2M interface
#   h265_extra: GOP size 30, low latency mode
#   bitrate_unit_kbps = false → element accepts bps
# -----------------------------------------------------------------------------
[encoder]
h265_element       = v4l2h265enc
h265_extra         = extra-controls="controls,video_gop_size=30,video_h264_i_frame_period=30"
h264_element       = v4l2h264enc
h264_extra         = extra-controls="controls,video_gop_size=30,video_h264_i_frame_period=30"
bitrate_unit_kbps  = false

# -----------------------------------------------------------------------------
# Decoder
#   Same Hantro VPU, M2M decode path
# -----------------------------------------------------------------------------
[decoder]
h265_element = v4l2h265dec
h265_extra   =
h264_element = v4l2h264dec
h264_extra   =

# -----------------------------------------------------------------------------
# Sink
#   kmssink: direct DRM/KMS → zero-copy HDMI output
#   NXP Wayland/Weston: waylandsink also valid
# -----------------------------------------------------------------------------
[sink]
hdmi    = kmssink
display = waylandsink

# -----------------------------------------------------------------------------
# Network
# -----------------------------------------------------------------------------
[network]
rtp_pt_h265    = 96
rtp_pt_h264    = 97
stream_port    = 5600
rtsp_port      = 8554
peer_ip_host   = 192.168.77.1
peer_ip_client = 192.168.77.2
