# =============================================================================
# NOT Tested — estimated config for NVIDIA Jetson Nano / Orin NX.
# Device Profile: NVIDIA Jetson Nano / Orin NX
# Wi-Fi: wlan0 | HW codec: nvv4l2h264enc / nvv4l2h265enc + nvv4l2decoder
# =============================================================================

[device]
name  = jetson
iface = wlan0

# -----------------------------------------------------------------------------
# Source
#   v4l2src with YUY2 — CSI camera via tegra-video or USB camera.
#   need_convert=true: YUY2 → NV12 for nvv4l2 encoders.
#   io_mode=2 (mmap): safe default. nvv4l2enc imports NV12 from system memory.
# -----------------------------------------------------------------------------
[source]
camera_device = /dev/video0
element       = v4l2src
caps_format   = YUY2
need_convert  = true
io_mode       = 2

# -----------------------------------------------------------------------------
# Encoder — Jetson NVENC via nvv4l2 (NOT a V4L2 M2M element)
#   nvv4l2h264enc / nvv4l2h265enc are Jetson-specific GStreamer plugins.
#   sender.c's v4l2 detection (strncmp "v4l2") does NOT match "nvv4l2",
#   so bitrate is set via the "bitrate" GStreamer property (in bps).
#   bitrate_unit_kbps=false: nvv4l2enc bitrate property is in bps.
#   preset-level=1 : MaxQuality preset on Jetson NVENC.
#   insert-sps-pps=true : inlines SPS/PPS before every IDR — essential for
#     RTP streams where the receiver may miss the first frames.
#   insert-vui=true : improves decoder compatibility on some peers.
#   idrinterval=15 : IDR every 15 frames — faster recovery on packet loss.
#     (Original value 30 is too large for lossy Wi-Fi links.)
#   iframeinterval=15 : must match idrinterval.
#   maxperf-enable=true : disables power-saving throttle on NVENC.
#   output_io_mode=0 : nvv4l2enc manages its own output buffers internally.
# -----------------------------------------------------------------------------
[encoder]
h265_element      = nvv4l2h265enc
h265_extra        = preset-level=1 insert-sps-pps=true insert-vui=true idrinterval=15 iframeinterval=15 maxperf-enable=true
h264_element      = nvv4l2h264enc
h264_extra        = preset-level=1 insert-sps-pps=true insert-vui=true idrinterval=15 iframeinterval=15 maxperf-enable=true
bitrate_unit_kbps = false
output_io_mode    = 0

# -----------------------------------------------------------------------------
# Decoder — nvv4l2decoder handles both H264 and H265.
# -----------------------------------------------------------------------------
[decoder]
h265_element = nvv4l2decoder
h265_extra   =
h264_element = nvv4l2decoder
h264_extra   =

# -----------------------------------------------------------------------------
# Sink
#   nv3dsink : Jetson zero-copy display sink (DRM/KMS via NV compositor).
#   autovideosink : fallback for headless / X11 setups.
# -----------------------------------------------------------------------------
[sink]
hdmi    = nv3dsink
display = autovideosink

# -----------------------------------------------------------------------------
# Network
#   Aligned with nxp.ini defaults for interop tests.
#   peer_ip_*      : same Wi-Fi Direct subnet used by NXP profile.
#   fec_percentage : 20% overhead for burst-loss resilience.
#   rtp_do_timestamp=false : keep sender timestamps when clocks are synced.
#   jitterbuffer_ms=50 : standard Wi-Fi Direct budget.
# -----------------------------------------------------------------------------
[network]
rtp_pt_h265       = 96
rtp_pt_h264       = 97
stream_port       = 5600
rtsp_port         = 8554
peer_ip_host      = 192.168.2.1
peer_ip_client    = 192.168.2.2
udp_buffer_size   = 8388608
rtp_do_timestamp  = false
jitterbuffer_ms   = 50
fec_percentage    = 20
fec_pt            = 122